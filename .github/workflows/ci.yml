name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        node-version: ["20", "22"]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true   # non-blocking until ESLint config is finalised

      - name: Run tests
        run: npm test

      - name: Build library
        run: npm run build:lib

      - name: Upload library artefact
        uses: actions/upload-artifact@v4
        with:
          name: chemschema-editor-dist-node${{ matrix.node-version }}
          path: frontend/dist/

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Create virtual environment
        run: uv venv .venv

      - name: Install dev dependencies
        run: uv pip install -e ".[dev]" --python .venv/bin/python

      - name: Lint (ruff)
        run: .venv/bin/python -m ruff check chemschema/ tests/ || true

      - name: Format check (black)
        run: .venv/bin/python -m black --check chemschema/ tests/ || true

      - name: Run tests
        run: .venv/bin/python -m pytest tests/ -v --tb=short

      - name: Test coverage
        run: .venv/bin/python -m pytest tests/ --cov=chemschema --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend-python${{ matrix.python-version }}
        continue-on-error: true
